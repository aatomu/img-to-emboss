<!DOCTYPE html>

<head>
  <title>Image to Emboss (Smooth Marching Squares)</title>
  <style>
    body {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-around;

      width: 100vw;
      margin: 0;
      padding: 0;
    }

    .box {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .box span {
      text-decoration: underline;
      margin-bottom: 5px;
    }

    .box img,
    .box canvas,
    .box svg {
      aspect-ratio: 9/16;
      width: 450px;
      image-rendering: pixelated;
      border-color: black;
      border-width: 2px;
      border-style: solid;
      background-color: white;
    }
  </style>
</head>

<body>
  <div class="box">
    <span>Source</span>
    <img id="source" src="./yuruyuru_atomu.svg"></img>
  </div>
  <div class="box">
    <span>Render Canvas</span>
    <canvas id="render_canvas"></canvas>
  </div>
  <div class="box">
    <span>Mesh Wireframe</span>
    <svg id="mesh_preview_svg"></svg>
  </div>
</body>

<script>
  const canvas_width = 360;
  const canvas_height = 640;
  const binarization_threshold = 128;

  const source = document.getElementById("source");
  const render_canvas = document.getElementById("render_canvas");
  const mesh_preview_svg = document.getElementById("mesh_preview_svg");

  render_canvas.width = canvas_width;
  render_canvas.height = canvas_height;
  mesh_preview_svg.setAttribute("viewBox", `0 0 ${canvas_width} ${canvas_height}`);

  function processImage() {
    // 1. imgからcanvasに転写
    drawImageWithScaleAndAlignment(source, render_canvas, 0.45, 0.45, "center", "middle");

    // 2. Render Canvas から直接 Marching Squares を実行（白・黒両方のメッシュを生成、境界頂点を共有）
    const cellSizeSize = 2; // 中間色を使うため、cellSizeが2や3でもかなり綺麗に出ます
    const meshData = generateGreedyMarchingSquaresMesh(render_canvas, binarization_threshold, cellSizeSize);
    console.log("Smooth Marching Squares メッシュデータ:", meshData);

    // 3. プレビューの描画 (黒面を濃いグレー、白面を薄いグレーで2色描画)
    drawMeshSVG(mesh_preview_svg, meshData);

    // 4. 3Dデータ(OBJ)として書き出し (白と黒に別々の厚みを与えて黒面を押し出す)
    const blackMesh = { vertices: meshData.vertices, indices: meshData.blackIndices, name: "black" };
    const whiteMesh = { vertices: meshData.vertices, indices: meshData.whiteIndices, name: "white" };

    // 厚みの設定：裏面は一律 Z=0。白（土台）は 2mm、黒（キャラ）は 10mm に押し出します
    const thicknessSettings = {
      black: 10.0, // 黒面の押し出し高さ
      white: 2.0   // 白面（土台）の厚み
    };

    const objText = exportToOBJ([blackMesh, whiteMesh], thicknessSettings);

    // ダウンロード処理
    const blob = new Blob([objText], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "character_emboss_smooth.obj";
    link.click();
  }

  source.onload = function () {
    processImage();
  };

  if (source.complete) {
    processImage();
  }

  /**
   * 画像を指定倍率・指定位置でキャンバスに描画する関数
   * @param {HTMLImageElement} img - 描画する画像要素
   * @param {HTMLCanvasElement} canvas - 描画先のキャンバス
   * @param {number} wScale - 横方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {number} hScale - 縦方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {string} hAlign - 左右の配置 ('left', 'center', 'right')
   * @param {string} vAlign - 上下の配置 ('top', 'middle', 'bottom')
   */
  function drawImageWithScaleAndAlignment(img, canvas, wScale = 1.0, hScale = 1.0, hAlign = "center", vAlign = "middle") {
    const ctx = canvas.getContext("2d");

    // キャンバスをクリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 指定された倍率を元に、描画時の「実際のサイズ」を計算
    const scaledW = img.naturalWidth * wScale;
    const scaledH = img.naturalHeight * hScale;

    const canvasW = canvas.width;
    const canvasH = canvas.height;

    // 2. 拡大・縮小後のサイズ（scaledW, scaledH）をベースに位置（X座標）を計算
    let x = 0;
    if (hAlign === "left") {
      x = 0;
    } else if (hAlign === "center") {
      x = (canvasW - scaledW) / 2;
    } else if (hAlign === "right") {
      x = canvasW - scaledW;
    }

    // 3. 拡大・縮小後のサイズをベースに位置（Y座標）を計算
    let y = 0;
    if (vAlign === "top") {
      y = 0;
    } else if (vAlign === "middle") {
      y = (canvasH - scaledH) / 2;
    } else if (vAlign === "bottom") {
      y = canvasH - scaledH;
    }

    // 4. 計算した座標と「変更後のサイズ」を指定して描画
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, x, y, scaledW, scaledH);
  }

  /**
   * 中間色を使用した線形補間付き Marching Squares (白黒対応 & 頂点共有)
   */
  function generateGreedyMarchingSquaresMesh(srcCanvas, threshold, cellSize = 8) {
    const ctx = srcCanvas.getContext("2d");
    const width = srcCanvas.width;
    const height = srcCanvas.height;
    const imgData = ctx.getImageData(0, 0, width, height);
    const data = imgData.data;

    // 1. 指定座標のピクセルの明るさを取得
    function getVal(x, y) {
      if (x < 0 || x >= width || y < 0 || y >= height) return 255;
      const idx = (y * width + x) * 4;
      // 透過ピクセルは白扱いにする
      if (data[idx + 3] === 0) return 255;
      return 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
    }

    // 線形補間
    function lerpOffset(v1, v2) {
      if (v1 === v2) return 0.5;
      return (threshold - v1) / (v2 - v1);
    }

    const vertexMap = new Map();
    const vertices = [];
    const blackIndices = [];
    const whiteIndices = [];

    function addVertex(x, y) {
      // 座標を小数点第2位で丸めて、近すぎる頂点を共有させる
      const kx = Math.round(x * 100) / 100;
      const ky = Math.round(y * 100) / 100;
      const key = `${kx},${ky}`;
      if (vertexMap.has(key)) return vertexMap.get(key);

      const idx = vertices.length / 2;
      vertices.push(kx, ky); // 丸めた座標を使用
      vertexMap.set(key, idx);
      return idx;
    }

    function addTriangle(p1, p2, p3, isWhite = false) {
      const targetIndices = isWhite ? whiteIndices : blackIndices;
      targetIndices.push(addVertex(p1.x, p1.y), addVertex(p2.x, p2.y), addVertex(p3.x, p3.y));
    }

    const cols = Math.floor((width - 1) / cellSize);
    const rows = Math.floor((height - 1) / cellSize);

    // 0 = 境界セル, 1 = 完全な黒(パターン15), 2 = 完全な白(パターン0)
    const greedyGrid = Array.from({ length: rows }, () => new Array(cols).fill(0));

    // --- フェーズ 1: Marching Squares の実行 & セル選別 ---
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * cellSize;
        const y = r * cellSize;

        const vTL = getVal(x, y);
        const vTR = getVal(x + cellSize, y);
        const vBL = getVal(x, y + cellSize);
        const vBR = getVal(x + cellSize, y + cellSize);

        const tl = vTL < threshold ? 1 : 0;
        const tr = vTR < threshold ? 1 : 0;
        const bl = vBL < threshold ? 1 : 0;
        const br = vBR < threshold ? 1 : 0;

        const state = (tl << 3) | (tr << 2) | (br << 1) | bl;

        if (state === 15) {
          greedyGrid[r][c] = 1; // 黒のGreedy対象
          continue;
        }
        if (state === 0) {
          greedyGrid[r][c] = 2; // 白のGreedy対象
          continue;
        }

        // 境界セル (1〜14): 白・黒両方のポリゴンを相互に補完するように分割
        const P_TL = { x: x, y: y };
        const P_TR = { x: x + cellSize, y: y };
        const P_BR = { x: x + cellSize, y: y + cellSize };
        const P_BL = { x: x, y: y + cellSize };

        const P_T = { x: x + cellSize * lerpOffset(vTL, vTR), y: y };
        const P_R = { x: x + cellSize, y: y + cellSize * lerpOffset(vTR, vBR) };
        const P_B = { x: x + cellSize * lerpOffset(vBL, vBR), y: y + cellSize };
        const P_L = { x: x, y: y + cellSize * lerpOffset(vTL, vBL) };

        switch (state) {
          case 1:
            addTriangle(P_L, P_B, P_BL, false);
            addTriangle(P_L, P_T, P_B, true); addTriangle(P_T, P_TR, P_B, true); addTriangle(P_TR, P_BR, P_B, true); addTriangle(P_TL, P_T, P_L, true);
            break;
          case 2:
            addTriangle(P_B, P_R, P_BR, false);
            addTriangle(P_TL, P_TR, P_R, true); addTriangle(P_TL, P_R, P_B, true); addTriangle(P_TL, P_B, P_BL, true);
            break;
          case 3:
            addTriangle(P_L, P_R, P_BR, false); addTriangle(P_L, P_BR, P_BL, false);
            addTriangle(P_TL, P_TR, P_R, true); addTriangle(P_TL, P_R, P_L, true);
            break;
          case 4:
            addTriangle(P_R, P_T, P_TR, false);
            addTriangle(P_TL, P_T, P_R, true); addTriangle(P_TL, P_R, P_BL, true); addTriangle(P_BL, P_R, P_BR, true);
            break;
          case 5:
            addTriangle(P_L, P_B, P_BL, false); addTriangle(P_R, P_T, P_TR, false);
            addTriangle(P_TL, P_T, P_L, true); addTriangle(P_T, P_R, P_L, true); addTriangle(P_L, P_R, P_B, true); addTriangle(P_R, P_BR, P_B, true);
            break;
          case 6:
            addTriangle(P_B, P_T, P_TR, false); addTriangle(P_B, P_TR, P_BR, false);
            addTriangle(P_TL, P_T, P_B, true); addTriangle(P_TL, P_B, P_BL, true);
            break;
          case 7:
            addTriangle(P_L, P_T, P_TR, false); addTriangle(P_L, P_TR, P_BR, false); addTriangle(P_L, P_BR, P_BL, false);
            addTriangle(P_TL, P_T, P_L, true);
            break;
          case 8:
            addTriangle(P_T, P_L, P_TL, false);
            addTriangle(P_T, P_TR, P_R, true); addTriangle(P_T, P_R, P_L, true); addTriangle(P_L, P_R, P_BR, true); addTriangle(P_L, P_BR, P_BL, true);
            break;
          case 9:
            addTriangle(P_T, P_B, P_BL, false); addTriangle(P_T, P_BL, P_TL, false);
            addTriangle(P_T, P_TR, P_BR, true); addTriangle(P_T, P_BR, P_B, true);
            break;
          case 10:
            addTriangle(P_T, P_L, P_TL, false); addTriangle(P_B, P_R, P_BR, false);
            addTriangle(P_L, P_T, P_TR, true); addTriangle(P_L, P_TR, P_R, true); addTriangle(P_L, P_R, P_B, true); addTriangle(P_L, P_B, P_BL, true);
            break;
          case 11:
            addTriangle(P_T, P_R, P_BR, false); addTriangle(P_T, P_BR, P_BL, false); addTriangle(P_T, P_BL, P_TL, false);
            addTriangle(P_T, P_TR, P_R, true);
            break;
          case 12:
            addTriangle(P_R, P_L, P_TL, false); addTriangle(P_R, P_TL, P_TR, false);
            addTriangle(P_L, P_R, P_BR, true); addTriangle(P_L, P_BR, P_BL, true);
            break;
          case 13:
            addTriangle(P_R, P_B, P_BL, false); addTriangle(P_R, P_BL, P_TL, false); addTriangle(P_R, P_TL, P_TR, false);
            addTriangle(P_B, P_R, P_BR, true);
            break;
          case 14:
            addTriangle(P_B, P_L, P_TL, false); addTriangle(P_B, P_TL, P_TR, false); addTriangle(P_B, P_TR, P_BR, false);
            addTriangle(P_L, P_B, P_BL, true);
            break;
        }
      }
    }

    // --- フェーズ 2: 2種類のセルに対する Greedy Meshing ---
    const visited = Array.from({ length: rows }, () => new Array(cols).fill(false));

    function runGreedyForType(targetType, isWhite) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (greedyGrid[r][c] !== targetType || visited[r][c]) continue;

          // 幅(w)の拡張
          let w = 1;
          while (c + w < cols && greedyGrid[r][c + w] === targetType && !visited[r][c + w]) {
            w++;
          }

          // 高さ(h)の拡張
          let h = 1;
          while (r + h < rows) {
            let lineMatch = true;
            for (let k = 0; k < w; k++) {
              if (greedyGrid[r + h][c + k] !== targetType || visited[r + h][c + k]) {
                lineMatch = false;
                break;
              }
            }
            if (!lineMatch) break;
            h++;
          }

          // 拡張した矩形範囲を訪問済みにする
          for (let dy = 0; dy < h; dy++) {
            for (let dx = 0; dx < w; dx++) {
              visited[r + dy][c + dx] = true;
            }
          }

          // 結合された巨大な矩形の4隅の座標を計算
          const x1 = c * cellSize;
          const y1 = r * cellSize;
          const x2 = (c + w) * cellSize;
          const y2 = (r + h) * cellSize;

          const G_TL = { x: x1, y: y1 };
          const G_TR = { x: x2, y: y1 };
          const G_BR = { x: x2, y: y2 };
          const G_BL = { x: x1, y: y2 };

          addTriangle(G_BL, G_TL, G_TR, isWhite);
          addTriangle(G_BL, G_TR, G_BR, isWhite);
        }
      }
    }

    runGreedyForType(1, false); // 黒矩形エリアの結合
    runGreedyForType(2, true);  // 白矩形エリアの結合

    return { vertices, blackIndices, whiteIndices };
  }

  /**
   * SVG要素を使って2色（濃いグレー：黒面 / 薄いグレー：白面）でワイヤーフレームと塗りつぶしプレビューを行う
   */
  function drawMeshSVG(svg, mesh) {
    const { vertices, blackIndices, whiteIndices } = mesh;

    // 白面（背景側）のパスデータを構築
    let whitePathData = "";
    for (let i = 0; i < whiteIndices.length; i += 3) {
      const v1x = vertices[whiteIndices[i] * 2], v1y = vertices[whiteIndices[i] * 2 + 1];
      const v2x = vertices[whiteIndices[i + 1] * 2], v2y = vertices[whiteIndices[i + 1] * 2 + 1];
      const v3x = vertices[whiteIndices[i + 2] * 2], v3y = vertices[whiteIndices[i + 2] * 2 + 1];
      whitePathData += `M ${v1x} ${v1y} L ${v2x} ${v2y} L ${v3x} ${v3y} Z `;
    }

    // 黒面（キャラクター側）のパスデータを構築
    let blackPathData = "";
    for (let i = 0; i < blackIndices.length; i += 3) {
      const v1x = vertices[blackIndices[i] * 2], v1y = vertices[blackIndices[i] * 2 + 1];
      const v2x = vertices[blackIndices[i + 1] * 2], v2y = vertices[blackIndices[i + 1] * 2 + 1];
      const v3x = vertices[blackIndices[i + 2] * 2], v3y = vertices[blackIndices[i + 2] * 2 + 1];
      blackPathData += `M ${v1x} ${v1y} L ${v2x} ${v2y} L ${v3x} ${v3y} Z `;
    }

    svg.innerHTML = "";

    // 1. 白面 (薄いグレー) のレイヤーを追加
    if (whitePathData) {
      const whitePathObj = document.createElementNS("http://www.w3.org/2000/svg", "path");
      whitePathObj.setAttribute("d", whitePathData);
      whitePathObj.setAttribute("stroke", "#D3D3D3"); // ライトグレーの線
      whitePathObj.setAttribute("stroke-width", "0.2");
      whitePathObj.setAttribute("fill", "#F0F0F0");   // 薄いグレーの塗り
      whitePathObj.setAttribute("stroke-linejoin", "round");
      svg.appendChild(whitePathObj);
    }

    // 2. 黒面 (濃いグレー) のレイヤーを追加
    if (blackPathData) {
      const blackPathObj = document.createElementNS("http://www.w3.org/2000/svg", "path");
      blackPathObj.setAttribute("d", blackPathData);
      blackPathObj.setAttribute("stroke", "#333333"); // チャコールの線
      blackPathObj.setAttribute("stroke-width", "0.3");
      blackPathObj.setAttribute("fill", "#555555");   // 濃いグレーの塗り
      blackPathObj.setAttribute("stroke-linejoin", "round");
      svg.appendChild(blackPathObj);
    }
  }

  /**
   * 白黒それぞれのメッシュに対して個別の厚みを設定して押し出す Wavefront OBJ 出力
   */
  /**
     * 白黒のメッシュを統合し、正しい境界の段差（段差壁と外周壁）を計算してOBJを出力する関数
     */
  function exportToOBJ(meshes, thicknessMap) {
    let objLines = [];
    objLines.push("# Wavefront OBJ file exported from Image to Emboss Processor");
    objLines.push("# Verified Water-tight Topology for Multi-Thickness Embossing");

    // 前提として頂点配列(vertices)は共通なので、最初のメッシュから取得
    const vertices = meshes[0].vertices;
    const vertexCount = vertices.length / 2;

    // 1. すべての頂点データを出力（各メッシュの前面Zと、共通の背面Z=0）
    // 後でインデックスを計算しやすくするため、最初に全ての高さを定義します
    // blackの前面(Z=10), whiteの前面(Z=2), 共通の背面(Z=0)
    const tBlack = thicknessMap["black"] !== undefined ? thicknessMap["black"] : 10.0;
    const tWhite = thicknessMap["white"] !== undefined ? thicknessMap["white"] : 2.0;

    objLines.push("# Vertices for Black Front (Z = " + tBlack + ")");
    for (let i = 0; i < vertices.length; i += 2) {
      objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} ${tBlack.toFixed(4)}`);
    }
    objLines.push("# Vertices for White Front (Z = " + tWhite + ")");
    for (let i = 0; i < vertices.length; i += 2) {
      objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} ${tWhite.toFixed(4)}`);
    }
    objLines.push("# Vertices for Shared Back (Z = 0.0)");
    for (let i = 0; i < vertices.length; i += 2) {
      objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} 0.0000`);
    }

    // OBJのインデックスオフセット（1-based）
    // 1 〜 vertexCount : 黒前面
    // (vertexCount + 1) 〜 (vertexCount * 2) : 白前面
    // (vertexCount * 2 + 1) 〜 (vertexCount * 3) : 共通背面
    const blackOffset = 1;
    const whiteOffset = 1 + vertexCount;
    const backOffset = 1 + vertexCount * 2;

    // 2. 表・裏面のポリゴン出力
    let blackMesh = meshes.find(m => m.name === "black");
    let whiteMesh = meshes.find(m => m.name === "white");

    if (blackMesh) {
      objLines.push("\ng black_surface");
      objLines.push("# Black Front faces");
      for (let i = 0; i < blackMesh.indices.length; i += 3) {
        objLines.push(`f ${blackOffset + blackMesh.indices[i]} ${blackOffset + blackMesh.indices[i + 1]} ${blackOffset + blackMesh.indices[i + 2]}`);
      }
      objLines.push("# Black Back faces (Z=0)");
      for (let i = 0; i < blackMesh.indices.length; i += 3) {
        objLines.push(`f ${backOffset + blackMesh.indices[i]} ${backOffset + blackMesh.indices[i + 2]} ${backOffset + blackMesh.indices[i + 1]}`);
      }
    }

    if (whiteMesh) {
      objLines.push("\ng white_surface");
      objLines.push("# White Front faces");
      for (let i = 0; i < whiteMesh.indices.length; i += 3) {
        objLines.push(`f ${whiteOffset + whiteMesh.indices[i]} ${whiteOffset + whiteMesh.indices[i + 1]} ${whiteOffset + whiteMesh.indices[i + 2]}`);
      }
      objLines.push("# White Back faces (Z=0)");
      for (let i = 0; i < whiteMesh.indices.length; i += 3) {
        objLines.push(`f ${backOffset + whiteMesh.indices[i]} ${backOffset + whiteMesh.indices[i + 2]} ${backOffset + whiteMesh.indices[i + 1]}`);
      }
    }

    // 3. 全エッジをスキャンして「本当のフチ」と「白黒境界の段差」を抽出
    objLines.push("\ng side_walls");
    const edgeMap = {};

    function registerEdges(mesh, meshType) {
      if (!mesh) return;
      for (let i = 0; i < mesh.indices.length; i += 3) {
        const tri = [mesh.indices[i], mesh.indices[i + 1], mesh.indices[i + 2]];
        for (let j = 0; j < 3; j++) {
          const u = tri[j];
          const v = tri[(j + 1) % 3];
          // 向きを保持するためにキーはソートするが、元の向き(from->to)を記録
          const key = u < v ? `${u}_${v}` : `${v}_${u}`;
          if (!edgeMap[key]) {
            edgeMap[key] = {
              count: 0,
              blackFromTo: null,
              whiteFromTo: null
            };
          }
          edgeMap[key].count++;
          if (meshType === "black") {
            edgeMap[key].blackFromTo = { from: u, to: v }
          };
          if (meshType === "white") {
            edgeMap[key].whiteFromTo = { from: u, to: v }
          };
        }
      }
    }

    registerEdges(blackMesh, "black");
    registerEdges(whiteMesh, "white");

    // エッジマップを走査して適切な壁を立てる
    objLines.push("# Generating precise wall polygons");
    for (const key in edgeMap) {
      const edge = edgeMap[key];

      // パターンA: 出現回数が1回 ＝ キャンバスの最外周（必ず白メッシュのフチになる）
      if (edge.count === 1 && edge.whiteFromTo) {
        const u = edge.whiteFromTo.from;
        const v = edge.whiteFromTo.to;

        // 白の前面(Z=2) と 共通背面(Z=0) の間に壁を立てる
        const f_u = whiteOffset + u;
        const f_v = whiteOffset + v;
        const b_u = backOffset + u;
        const b_v = backOffset + v;

        objLines.push(`f ${f_u} ${b_u} ${b_v}`);
        objLines.push(`f ${f_u} ${b_v} ${f_v}`);
      }

      // パターンB: 黒メッシュと白メッシュの境界線（両方から1回ずつ参照されて count === 2 になる）
      if (edge.blackFromTo && edge.whiteFromTo) {
        // 黒三角形の向きを基準にして、段差の壁（Z=2 から Z=10）を立てる
        const u = edge.blackFromTo.from;
        const v = edge.blackFromTo.to;

        const black_u = blackOffset + u;
        const black_v = blackOffset + v;
        const white_u = whiteOffset + u;
        const white_v = whiteOffset + v;

        // 黒前面(Z=10) と 白前面(Z=2) の隙間を埋める垂直な壁
        objLines.push(`f ${black_u} ${white_u} ${white_v}`);
        objLines.push(`f ${black_u} ${white_v} ${black_v}`);
      }
    }

    return objLines.join("\n");
  }
