<!DOCTYPE html>

<head>
  <title>Image to Emboss</title>

  <style>
    body {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-around;

      width: 100vw;
      margin: 0;
      padding: 0;
    }

    .box {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .box span {
      text-decoration: underline;
    }

    .box img,
    .box canvas {
      aspect-ratio: 9/16;
      width: 450px;
      image-rendering: pixelated;

      border-color: black;
      border-width: 2px;
      border-style: solid;
    }
  </style>
</head>

<body>
  <div class="box">
    <span>Source</span>
    <img id="source" src="./yuruyuru_atomu.svg"></img>
  </div>
  <div class="box">
    <span>Render Canvas</span>
    <canvas id="render_canvas"></canvas>
  </div>
  <div class="box">
    <span>Binarization Canvas</span>
    <canvas id="binarization_canvas"></canvas>
  </div>
  <div class="box">
    <span>Boundary Canvas</span>
    <canvas id="boundary_canvas"></canvas>
  </div>
  <div class="box">
    <span>Mesh Point Canvas</span>
    <canvas id="meshpoint_canvas"></canvas>
  </div>
</body>

<script>
  // const canvas_width = 144;
  // const canvas_height = 256;
  const canvas_width = 360;
  const canvas_height = 640;
  const binarization_threshold = 128; // この値より明るければ白、暗ければ黒
  const colors = ["#FFA07A", "#E9967A", "#FA8072", "#F08080", "#CD5C5C", "#FF7F50", "#FF6347", "#FF4500", "#DC143C", "#B22222", "#8B0000"];

  const source = document.getElementById("source");
  const render_canvas = document.getElementById("render_canvas");
  const binarization_canvas = document.getElementById("binarization_canvas");
  const boundary_canvas = document.getElementById("boundary_canvas");
  const meshpoint_canvas = document.getElementById("meshpoint_canvas");

  // 【初期設定】キャンバスのサイズを設定（最初の質問の通り、ここで画質・解像度が決まります）
  render_canvas.width = canvas_width;
  render_canvas.height = canvas_height;
  binarization_canvas.width = canvas_width;
  binarization_canvas.height = canvas_height;
  boundary_canvas.width = canvas_width;
  boundary_canvas.height = canvas_height;
  meshpoint_canvas.width = canvas_width;
  meshpoint_canvas.height = canvas_height;

  // 描画と二値化を一括で行うヘルパー関数
  function processImage() {
    // 1. imgからcanvasに転写
    drawImageWithScaleAndAlignment(source, render_canvas, 0.45, 0.45, "center", "middle");
    // 2. 二値化処理
    applyBinarization(render_canvas, binarization_canvas, binarization_threshold);
    // 3. 輪郭抽出
    const lines = extractAndTraceBoundary(binarization_canvas, boundary_canvas);
    console.log("元の輪郭データ:", lines);

    // 4. 取得したすべての線を一括で間引き（epsilon = 2.0 に設定）＆ 戻り値を取得
    const simplifiedLines = simplifyLines(meshpoint_canvas, lines, 0.5);
    console.log("間引き後の頂点データ:", simplifiedLines);

    // 5. 内包関係処理をした頂点データ
    const relationTree = analyzeInclusionRelationship(simplifiedLines);
    console.log("内包関係の結果:", relationTree);

    // 6. メッシュ処理
    const meshData = generateMeshWithoutLibrary(relationTree)
    console.log("メッシュデータ:", meshData);

    const objText = exportToOBJ(meshData, 10.0);
    // ブラウザで即座に「character_emboss.obj」としてダウンロードさせる
    const blob = new Blob([objText], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "character_emboss.obj";
    link.click();
  }

  source.onload = function () {
    processImage();
  };

  if (source.complete) {
    processImage();
  }

  /**
   * 画像を指定倍率・指定位置でキャンバスに描画する関数
   * @param {HTMLImageElement} img - 描画する画像要素
   * @param {HTMLCanvasElement} canvas - 描画先のキャンバス
   * @param {number} wScale - 横方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {number} hScale - 縦方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {string} hAlign - 左右の配置 ('left', 'center', 'right')
   * @param {string} vAlign - 上下の配置 ('top', 'middle', 'bottom')
   */
  function drawImageWithScaleAndAlignment(img, canvas, wScale = 1.0, hScale = 1.0, hAlign = "center", vAlign = "middle") {
    const ctx = canvas.getContext("2d");

    // キャンバスをクリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 指定された倍率を元に、描画時の「実際のサイズ」を計算
    const scaledW = img.naturalWidth * wScale;
    const scaledH = img.naturalHeight * hScale;

    const canvasW = canvas.width;
    const canvasH = canvas.height;

    // 2. 拡大・縮小後のサイズ（scaledW, scaledH）をベースに位置（X座標）を計算
    let x = 0;
    if (hAlign === "left") {
      x = 0;
    } else if (hAlign === "center") {
      x = (canvasW - scaledW) / 2;
    } else if (hAlign === "right") {
      x = canvasW - scaledW;
    }

    // 3. 拡大・縮小後のサイズをベースに位置（Y座標）を計算
    let y = 0;
    if (vAlign === "top") {
      y = 0;
    } else if (vAlign === "middle") {
      y = (canvasH - scaledH) / 2;
    } else if (vAlign === "bottom") {
      y = canvasH - scaledH;
    }

    // 4. 計算した座標と「変更後のサイズ」を指定して描画
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, x, y, scaledW, scaledH);
  }

  /**
   * 元キャンバスの画像を二値化して、先キャンバスに描画する関数
   * @param {HTMLCanvasElement} srcCanvas - 元となるキャンバス（Render Canvas）
   * @param {HTMLCanvasElement} dstCanvas - 出力先のキャンバス（Binarization Canvas）
   * @param {number} threshold - 閾値 (0 ~ 255)
   */
  function applyBinarization(srcCanvas, dstCanvas, threshold) {
    const srcCtx = srcCanvas.getContext("2d");
    const dstCtx = dstCanvas.getContext("2d");

    // 1. 元キャンバスからピクセルデータを取得
    const imageData = srcCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
    const data = imageData.data; // [R, G, B, A, R, G, B, A, ...] という配列になっている

    // 2. 全ピクセルをループ処理
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];     // 赤
      const g = data[i + 1]; // 緑
      const b = data[i + 2]; // 青
      const a = data[i + 3]; // 透明度 (0 = 完全透明, 255 = 完全不透明)

      // 元画像が透過（SVGの背景など）の場合の対策：透明部分は白（255）として扱う
      if (a === 0) {
        data[i] = 255;     // R
        data[i + 1] = 255; // G
        data[i + 2] = 255; // B
        continue;
      }

      // 一般的なグレースケール（輝度）変換公式 (NTSC係数による加重平均)
      const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

      // 3. 閾値（threshold）を基準に白か黒かに判定
      const color = brightness >= threshold ? 255 : 0;

      // 4. データを書き換え
      data[i] = color;     // R
      data[i + 1] = color; // G
      data[i + 2] = color; // B
      data[i + 3] = 255;   // A (不透明にする)
    }

    // 5. 処理後のピクセルデータを二値化キャンバスに描き出す
    dstCtx.putImageData(imageData, 0, 0);
  }

  /**
     * 1. 輪郭追跡を行い、1pixelずつ確実に色分け描画した上で、座標の多重配列を返す関数
     * @param {HTMLCanvasElement} binCanvas - 二値化キャンバス
     * @param {HTMLCanvasElement} bndCanvas - 境界線描画先キャンバス
     * @returns {Array<Array<{x:number, y:number}>>} 追跡されたすべての線の配列
     */
  function extractAndTraceBoundary(binCanvas, bndCanvas) {
    const binCtx = binCanvas.getContext("2d");
    const bndCtx = bndCanvas.getContext("2d");
    const width = binCanvas.width;
    const height = binCanvas.height;

    // 背景を白で初期化
    bndCtx.fillStyle = "white";
    bndCtx.fillRect(0, 0, width, height);

    const binImageData = binCtx.getImageData(0, 0, width, height);
    const binData = binImageData.data;

    // 黒ピクセル判定
    function isBlackPixel(x, y) {
      if (x < 0 || x >= width || y < 0 || y >= height) return false;
      const idx = (y * width + x) * 4;
      return binData[idx] < 128 && binData[idx + 3] > 0;
    }

    // 【ステップ1】1px幅の綺麗なエッジマップを作成
    const isEdge = Array.from({ length: height }, () => new Uint8Array(width));
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        if (isBlackPixel(x, y)) {
          // 上下左右のいずれかが白（または画面外）なら輪郭ピクセル
          if (!isBlackPixel(x, y - 1) || !isBlackPixel(x, y + 1) ||
            !isBlackPixel(x - 1, y) || !isBlackPixel(x + 1, y)) {
            isEdge[y][x] = 1;
          }
        }
      }
    }

    // 【ステップ2】外周トレース処理
    const visited = Array.from({ length: height }, () => new Uint8Array(width));
    const allLines = [];

    // 8方向の定義（0:右, 1:右下, 2:下, 3:左下, 4:左, 5:左上, 6:上, 7:右上）
    const dx = [1, 1, 0, -1, -1, -1, 0, 1];
    const dy = [0, 1, 1, 1, 0, -1, -1, -1];

    let colorIndex = 0;

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        // 未訪問のエッジを見つけたら、そこから一本の線を追跡開始
        if (isEdge[y][x] && !visited[y][x]) {

          const currentPath = [];
          let cx = x;
          let cy = y;

          // 初期侵入方向（左から右へスキャンして見つけたため、最初は右方向を基準にする）
          let dir = 0;

          const startX = x;
          const startY = y;

          while (true) {
            visited[cy][cx] = 1;
            currentPath.push({ x: cx, y: cy });

            let foundNext = false;

            // 左後ろ（dir + 5）から時計回りに周囲8マスを走査
            for (let i = 0; i < 8; i++) {
              const nextDir = (dir + 5 + i) % 8;
              const nx = cx + dx[nextDir];
              const ny = cy + dy[nextDir];

              if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                // スタート地点に戻ってきた場合（ループの結合判定）
                if (nx === startX && ny === startY && currentPath.length > 2) {
                  currentPath.push({ x: startX, y: startY });
                  foundNext = true;
                  cx = nx;
                  cy = ny;
                  break;
                }

                // 未訪問の輪郭ピクセルを発見
                if (isEdge[ny][nx] && !visited[ny][nx]) {
                  cx = nx;
                  cy = ny;
                  dir = nextDir;
                  foundNext = true;
                  break;
                }
              }
            }

            // 次のピクセルがない、またはスタート地点に完全に融合したら追跡終了
            if (!foundNext || (cx === startX && cy === startY)) {
              break;
            }
          }

          // 【ステップ3】1pixelずつ確実にキャンバスへ塗る処理
          // 2ピクセル以下の極小ノイズでなければ描画・登録
          if (currentPath.length > 2) {
            allLines.push(currentPath);

            // この線専用の色を決定
            const strokeColor = colors[colorIndex % colors.length];
            colorIndex++;

            // ctx.lineTo は斜め移動時に見た目がかすれることがあるため、
            // 座標配列から1ピクセルずつ 1x1 の正方形として確実に塗りつぶします
            bndCtx.fillStyle = strokeColor;
            for (let i = 0; i < currentPath.length; i++) {
              bndCtx.fillRect(currentPath[i].x, currentPath[i].y, 1, 1);
            }
          }
        }
      }
    }

    return allLines;
  }

  /**
   * 2. 受け取ったすべての線をダグラス・ペッカー法で間引き、Meshpoint Canvas にドットを描画して、間引いた線の配列を返す関数
   * @param {HTMLCanvasElement} mshCanvas - メッシュポイント描画先キャンバス
   * @param {Array<Array<{x:number, y:number}>>} lines - 線の多重配列
   * @param {number} epsilon - 間引きのしきい値
   * @returns {Array<Array<{x:number, y:number}>>} 間引かれたすべての線の多重配列
   */
  function simplifyLines(mshCanvas, lines, epsilon = 2.0) {
    const mshCtx = mshCanvas.getContext("2d");
    const width = mshCanvas.width;
    const height = mshCanvas.height;

    // キャンバスの初期化（白背景）
    mshCtx.fillStyle = "white";
    mshCtx.fillRect(0, 0, width, height);

    // 指定されたカラーパレット
    const colors = ["#FFA07A", "#E9967A", "#FA8072", "#F08080", "#CD5C5C", "#FF7F50", "#FF6347", "#FF4500", "#DC143C", "#B22222", "#8B0000"];

    // 間引いた後のすべての線を格納する配列
    const allSimplifiedLines = [];

    // 全ての線（パス）に対してループを回す
    for (let l = 0; l < lines.length; l++) {
      const path = lines[l];
      if (path.length < 3) continue; // 点が少なすぎるパスはスキップ

      let simplifiedPath;
      const start = path[0];
      const end = path[path.length - 1];

      // 閉じた輪郭（ループ）の分割処理
      if (start.x === end.x && start.y === end.y) {
        const mid = Math.floor(path.length / 2);
        const part1 = runDouglasPeucker(path.slice(0, mid + 1), epsilon);
        const part2 = runDouglasPeucker(path.slice(mid), epsilon);
        simplifiedPath = part1.slice(0, part1.length - 1).concat(part2);
      } else {
        simplifiedPath = runDouglasPeucker(path, epsilon);
      }

      // 結果の配列に追加
      allSimplifiedLines.push(simplifiedPath);

      // このライン（line）専用の色を配列から決定
      const strokeColor = colors[l % colors.length];
      mshCtx.fillStyle = strokeColor;

      // 間引かれた頂点を 1x1 のドットとして確実に塗りつぶす
      for (let i = 0; i < simplifiedPath.length; i++) {
        mshCtx.fillRect(simplifiedPath[i].x, simplifiedPath[i].y, 1, 1);
      }
    }

    // 間引いた後の多重配列を返す
    return allSimplifiedLines;
  }

  /**
   * 3. ダグラス・ペッカー法（アルゴリズム本体の再帰ロジック）
   */
  function runDouglasPeucker(points, epsilon) {
    if (points.length <= 2) return points;

    let maxDistance = 0;
    let index = 0;
    const end = points.length - 1;

    // 始点と終点を結ぶ直線から、最も遠い位置にある点（最大誤差の点）を探す
    for (let i = 1; i < end; i++) {
      const distance = getOrthogonalDistance(points[i], points[0], points[end]);
      if (distance > maxDistance) {
        index = i;
        maxDistance = distance;
      }
    }

    // 最大誤差がしきい値(epsilon)を超えている場合のみ、その点でパスを分割して再帰処理
    if (maxDistance > epsilon) {
      const results1 = runDouglasPeucker(points.slice(0, index + 1), epsilon);
      const results2 = runDouglasPeucker(points.slice(index), epsilon);
      // 境界の重複点を排除して結合
      return results1.slice(0, results1.length - 1).concat(results2);
    } else {
      // 誤差が十分に小さければ、中間の細かなギザギザ（曲線含む）はすべて直線とみなし両端だけ残す
      return [points[0], points[end]];
    }
  }

  /**
   * 4. 点と直線の最短距離を計算するヘルパー（安全版）
   */
  function getOrthogonalDistance(point, lineStart, lineEnd) {
    const dx = lineEnd.x - lineStart.x;
    const dy = lineEnd.y - lineStart.y;

    // 万が一、始点と終点が完全に一致していた場合の安全処理（点と点の距離を返す）
    const bottom = Math.sqrt(dx * dx + dy * dy);
    if (bottom === 0) {
      const splitDx = point.x - lineStart.x;
      const splitDy = point.y - lineStart.y;
      return Math.sqrt(splitDx * splitDx + splitDy * splitDy);
    }

    // 点と直線の距離の公式
    const area = Math.abs(dy * point.x - dx * point.y + lineEnd.x * lineStart.y - lineEnd.y * lineStart.x);
    return area / bottom;
  }

  function analyzeInclusionRelationship(allSimplifiedLines) {
    // 1. 各ポリゴンの面積と巻き方向（CW:時計回り / CCW:反時計回り）を計算
    // 抽出直後の二値化画像からは、外周(Outer)と内周(Inner)で必ず巻き方向が逆になります。
    const polygons = allSimplifiedLines.map((line, index) => {
      let area = 0;
      for (let i = 0; i < line.length; i++) {
        const j = (i + 1) % line.length;
        area += line[i].x * line[j].y - line[j].x * line[i].y;
      }
      area /= 2;

      // AABB (Bounding Box) を計算して、当たり判定の高速化と正確性を担保
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      line.forEach(p => {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
      });

      return {
        index: index,
        line: line,
        area: Math.abs(area),
        isCCW: area < 0, // 巻き方向
        bounds: { minX, maxX, minY, maxY }
      };
    });

    // 2. 面積が大きい順にソート（大きいポリゴンほど「親」になりやすいため）
    polygons.sort((a, b) => b.area - a.area);

    // 3. 階層構造（親子関係）の決定
    const lineInfos = polygons.map(target => {
      let directParent = null;
      let minParentArea = Infinity;

      // 自分より面積が大きいポリゴン（親の候補）だけをチェック
      polygons.forEach(potentialParent => {
        if (target.index === potentialParent.index) return;
        if (potentialParent.area <= target.area) return;

        // 簡易判定：そもそもBounding Boxに完全に入っているか
        const tb = target.bounds;
        const pb = potentialParent.bounds;
        if (tb.minX >= pb.minX && tb.maxX <= pb.maxX && tb.minY >= pb.minY && tb.maxY <= pb.maxY) {

          // 厳密なレイキャスティング判定（複数点でチェックして頑健性を高める）
          let insideCount = 0;
          const testPoints = [
            target.line[0],
            target.line[Math.floor(target.line.length / 2)],
            { x: (tb.minX + tb.maxX) / 2, y: (tb.minY + tb.maxY) / 2 } // 中心点
          ];

          testPoints.forEach(pt => {
            if (robustIsPointInPolygon(pt, potentialParent.line)) {
              insideCount++;
            }
          });

          // 過半数が内側に入っているなら内包されているとみなす
          if (insideCount >= 2) {
            // 最も内側（＝面積が最も小さい親）を直接の親とする
            if (potentialParent.area < minParentArea) {
              minParentArea = potentialParent.area;
              directParent = potentialParent.index;
            }
          }
        }
      });

      return {
        index: target.index,
        line: target.line,
        directParent: directParent
      };
    });

    // 4. 親カウント（深さ）を計算してツリーを組み立て
    lineInfos.forEach(info => {
      let count = 0;
      let p = info.directParent;
      while (p !== null) {
        count++;
        const parentInfo = lineInfos.find(item => item.index === p);
        p = parentInfo ? parentInfo.directParent : null;
      }
      info.parentCount = count;
    });

    function buildTree(parentIndex, depth) {
      const children = lineInfos.filter(info =>
        parentIndex === null ? info.parentCount === 0 : info.directParent === parentIndex
      );

      return children.map(child => {
        const type = (depth % 2 === 0) ? "outer" : "inner";
        return {
          type: type,
          lines: child.line.map(p => [p.x, p.y]),
          contents: buildTree(child.index, depth + 1)
        };
      });
    }

    return buildTree(null, 0);
  }

  /**
   * レイキャスティング法のバグ（エッジ上の不確定性）を排除した堅牢な内外判定
   */
  function robustIsPointInPolygon(point, polygon) {
    let inside = false;
    const x = point.x, y = point.y;

    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const xi = polygon[i].x, yi = polygon[i].y;
      const xj = polygon[j].x, yj = polygon[j].y;

      // 完全にエッジ上、あるいは頂点上に乗っている場合の微小なブレを許容
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  }

  /**
   * 独自実装のポリゴン三角形分割（穴対応型・耳切り法ベース）
   * @param {Array<Object>} treeData - analyzeInclusionRelationship の返り値
   * @returns {Array<{vertices: number[], indices: number[]}>} メッシュデータの配列
   */
  function generateMeshWithoutLibrary(treeData) {
    const meshes = [];

    treeData.forEach(rootNode => {
      if (rootNode.type !== "outer") return;

      // --- 1. 穴（Inner）を外周（Outer）に結合して一本の閉じたパスにする ---
      // 外周のコピー（オブジェクト構造から {x, y, id} の形へマッピング）
      let combinedPolygon = rootNode.lines.map((p, i) => ({ x: p[0], y: p[1], id: i }));
      let globalVertices = rootNode.lines.map(p => ({ x: p[0], y: p[1] }));

      // 穴を一つずつ外周に結合
      rootNode.contents.forEach(childNode => {
        if (childNode.type !== "inner") return;

        const hole = childNode.lines.map(p => ({ x: p[0], y: p[1] }));
        // 穴の頂点もグローバルな頂点リストに登録
        const holeStartIdx = globalVertices.length;
        hole.forEach(p => globalVertices.push({ x: p.x, y: p.y }));
        const holePolygon = hole.map((p, i) => ({ x: p.x, y: p.y, id: holeStartIdx + i }));

        combinedPolygon = bridgeHoleToOuter(combinedPolygon, holePolygon);
      });

      // --- 2. 一筆書きになったポリゴンを耳切り法で三角形に分割 ---
      const indices = [];
      let polygon = [...combinedPolygon];

      // 時計回り(CW)か反時計回り(CCW)かを判定し、耳切り法のために頂点順序を標準化
      if (getPolygonArea(polygon) < 0) {
        polygon.reverse();
      }

      // 頂点が3つになるまで切り落としループ
      let timeout = polygon.length * 2; // 無限ループ防止策
      while (polygon.length > 2 && timeout > 0) {
        timeout--;
        let earFound = false;

        for (let i = 0; i < polygon.length; i++) {
          const prev = polygon[(i - 1 + polygon.length) % polygon.length];
          const curr = polygon[i];
          const next = polygon[(i + 1) % polygon.length];

          // 1. 凸判定（内角が180度未満か）
          if (crossProduct(prev, curr, next) <= 0) continue;

          // 2. 判定対象の三角形(prev, curr, next)の内部に、他の頂点が含まれていないか
          let hasPointInside = false;
          for (let j = 0; j < polygon.length; j++) {
            const p = polygon[j];
            if (p.id === prev.id || p.id === curr.id || p.id === next.id) continue;

            if (isPointInTriangle(p, prev, curr, next)) {
              hasPointInside = true;
              break;
            }
          }

          // 耳が見つかったら切り落とす
          if (!hasPointInside) {
            indices.push(prev.id, curr.id, next.id);
            polygon.splice(i, 1); // 現在の頂点を除去
            earFound = true;
            break;
          }
        }

        if (!earFound) {
          // 幾何学的な誤差や自己交差で耳が見つからない場合の安全弁
          // 最悪の場合、無理やり最初の3点で三角形を作る
          indices.push(polygon[0].id, polygon[1].id, polygon[2].id);
          polygon.splice(1, 1);
        }
      }

      // 出力用にフラットな座標配列 [x0,y0, x1,y1, ...] に変換
      const verticesFlat = [];
      globalVertices.forEach(v => verticesFlat.push(v.x, v.y));

      meshes.push({
        vertices: verticesFlat,
        indices: indices
      });
    });

    return meshes;
  }

  /**
   * 外周ポリゴンと穴ポリゴンを最短距離の直線（ブリッジ）で結合する
   */
  function bridgeHoleToOuter(outer, hole) {
    let maxOuterIdx = 0;
    let maxHoleIdx = 0;
    let minDistance = Infinity;

    // 穴の頂点と外周の頂点の間で、もっとも距離が近いペアを探す
    // （X座標が最大となる穴の頂点から右にレイを飛ばす方法が一般的ですが、総当たりが最も頑健です）
    for (let i = 0; i < outer.length; i++) {
      for (let j = 0; j < hole.length; j++) {
        const dx = outer[i].x - hole[j].x;
        const dy = outer[i].y - hole[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < minDistance) {
          minDistance = dist;
          maxOuterIdx = i;
          maxHoleIdx = j;
        }
      }
    }

    const bridged = [];
    // 1. 外周のスタートから結合点までコピー
    for (let i = 0; i <= maxOuterIdx; i++) bridged.push(outer[i]);

    // 2. 穴を結合点から1周コピーして戻ってくる
    for (let j = 0; j <= hole.length; j++) {
      bridged.push(hole[(maxHoleIdx + j) % hole.length]);
    }

    // 3. 外周の結合点から最後までをコピー
    for (let i = maxOuterIdx; i < outer.length; i++) bridged.push(outer[i]);

    return bridged;
  }

  /**
   * ベクトルの外積（凸判定・巻き方向判定用）
   */
  function crossProduct(p1, p2, p3) {
    return (p2.x - p1.x) * (p3.y - p2.y) - (p2.y - p1.y) * (p3.x - p2.x);
  }

  /**
   * ポリゴンの符号付き面積を計算（方向判定用）
   */
  function getPolygonArea(polygon) {
    let area = 0;
    for (let i = 0; i < polygon.length; i++) {
      const j = (i + 1) % polygon.length;
      area += polygon[i].x * polygon[j].y;
      area -= polygon[j].x * polygon[i].y;
    }
    return area / 2;
  }

  /**
   * 点pが三角形(a, b, c)の内部にあるかどうかの判定
   */
  function isPointInTriangle(p, a, b, c) {
    const cp1 = crossProduct(a, b, p);
    const cp2 = crossProduct(b, c, p);
    const cp3 = crossProduct(c, a, p);

    // すべての外積の符号が一致していれば内部にある
    return ((cp1 >= 0 && cp2 >= 0 && cp3 >= 0) || (cp1 <= 0 && cp2 <= 0 && cp3 <= 0));
  }

  /**
   * 独自実装の2D三角メッシュ構造から3D立体(押し出し面)を形成し、OBJ形式の文字列に変換する関数
   * @param {Array} meshes - generateMeshWithoutLibrary の返り値（vertices, indices を持つオブジェクトの配列）
   * @param {number} thickness - 押し出す立体(Z方向)の厚み
   * @returns {string} Wavefront OBJフォーマットのテキスト
   */
  function exportToOBJ(meshes, thickness = 10.0) {
    let objLines = [];
    objLines.push("# Wavefront OBJ file exported from Image to Emboss Processor");
    objLines.push("# Generated on demand via custom Ear Clipping triangulation");

    let vertexOffset = 1; // OBJのインデックスは1から始まります

    meshes.forEach((mesh, mIdx) => {
      objLines.push(`\no mesh_part_${mIdx}`);
      const vertices = mesh.vertices;
      const indices = mesh.indices;
      const vertexCount = vertices.length / 2;

      // 1. 頂点データ出力 (前面 Z = thickness, 背面 Z = 0)
      // 前面 (Front side)
      for (let i = 0; i < vertices.length; i += 2) {
        objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} ${thickness.toFixed(4)}`);
      }
      // 背面 (Back side)
      for (let i = 0; i < vertices.length; i += 2) {
        objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} 0.0000`);
      }

      // 2. 面データ出力 (前面・背面・側面のポリゴンをインデックス構築)
      objLines.push("# Front faces");
      for (let i = 0; i < indices.length; i += 3) {
        // 前面は反時計回り(CCW)
        const v0 = vertexOffset + indices[i];
        const v1 = vertexOffset + indices[i + 1];
        const v2 = vertexOffset + indices[i + 2];
        objLines.push(`f ${v0} ${v1} ${v2}`);
      }

      objLines.push("# Back faces");
      for (let i = 0; i < indices.length; i += 3) {
        // 背面は前面の裏側になるので、法線を外に向けるために頂点の順序を反転
        const v0 = vertexOffset + vertexCount + indices[i];
        const v1 = vertexOffset + vertexCount + indices[i + 2];
        const v2 = vertexOffset + vertexCount + indices[i + 1];
        objLines.push(`f ${v0} ${v1} ${v2}`);
      }

      // 3. 側面 (Side walls) の自動生成
      objLines.push("# Side wall faces");

      // エッジマップを作って出現回数をカウント
      const edgeMap = {};
      for (let i = 0; i < indices.length; i += 3) {
        const tri = [indices[i], indices[i + 1], indices[i + 2]];
        for (let j = 0; j < 3; j++) {
          const u = tri[j];
          const v = tri[(j + 1) % 3];
          const key = u < v ? `${u}_${v}` : `${v}_${u}`;
          if (!edgeMap[key]) {
            edgeMap[key] = { count: 1, from: u, to: v };
          } else {
            edgeMap[key].count++;
          }
        }
      }

      // countが1のエッジ（＝他の三角形と共有されていない＝一番外側の外周、または内周の穴のフチ）を側面として壁を立てる
      for (const key in edgeMap) {
        if (edgeMap[key].count === 1) {
          const u = edgeMap[key].from;
          const v = edgeMap[key].to;

          // 前面の2点
          const f_u = vertexOffset + u;
          const f_v = vertexOffset + v;
          // 背面の2点
          const b_u = vertexOffset + vertexCount + u;
          const b_v = vertexOffset + vertexCount + v;

          // 2つの三角形(テクスチャのポリゴン単位)を組み合わせて側面の四角形の壁を作る
          objLines.push(`f ${f_u} ${b_u} ${b_v}`);
          objLines.push(`f ${f_u} ${b_v} ${f_v}`);
        }
      }

      // 次の独立メッシュ（パーツ）へ向けてインデックスをずらす
      vertexOffset += vertexCount * 2;
    });

    return objLines.join("\n");
  }
