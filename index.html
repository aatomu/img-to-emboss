<!DOCTYPE html>

<head>
  <title>Image to Emboss</title>

  <style>
    body {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-around;

      width: 100vw;
      margin: 0;
      padding: 0;
    }

    .box {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .box span {
      text-decoration: underline;
    }

    .box img,
    .box canvas {
      aspect-ratio: 9/16;
      width: 450px;
      image-rendering: pixelated;

      border-color: black;
      border-width: 2px;
      border-style: solid;
    }
  </style>
</head>

<body>
  <div class="box">
    <span>Source</span>
    <img id="source" src="./yuruyuru_atomu.svg"></img>
  </div>
  <div class="box">
    <span>Render Canvas</span>
    <canvas id="render_canvas"></canvas>
  </div>
  <div class="box">
    <span>Binarization Canvas</span>
    <canvas id="binarization_canvas"></canvas>
  </div>
  <div class="box">
    <span>Boundary Canvas</span>
    <canvas id="boundary_canvas"></canvas>
  </div>
  <div class="box">
    <span>Mesh Point Canvas</span>
    <canvas id="meshpoint_canvas"></canvas>
  </div>
</body>

<script>
  // const canvas_width = 144;
  // const canvas_height = 256;
  const canvas_width = 360;
  const canvas_height = 640;
  const binarization_threshold = 128; // この値より明るければ白、暗ければ黒
  const colors = ["#FFA07A", "#E9967A", "#FA8072", "#F08080", "#CD5C5C", "#FF7F50", "#FF6347", "#FF4500", "#DC143C", "#B22222", "#8B0000"];

  const source = document.getElementById("source");
  const render_canvas = document.getElementById("render_canvas");
  const binarization_canvas = document.getElementById("binarization_canvas");
  const boundary_canvas = document.getElementById("boundary_canvas");
  const meshpoint_canvas = document.getElementById("meshpoint_canvas");

  // 【初期設定】キャンバスのサイズを設定（最初の質問の通り、ここで画質・解像度が決まります）
  render_canvas.width = canvas_width;
  render_canvas.height = canvas_height;
  binarization_canvas.width = canvas_width;
  binarization_canvas.height = canvas_height;
  boundary_canvas.width = canvas_width;
  boundary_canvas.height = canvas_height;
  meshpoint_canvas.width = canvas_width;
  meshpoint_canvas.height = canvas_height;

  // 描画と二値化を一括で行うヘルパー関数
  function processImage() {
    // 1. imgからcanvasに転写
    drawImageWithScaleAndAlignment(source, render_canvas, 0.45, 0.45, "center", "middle");
    // 2. 二値化処理
    applyBinarization(render_canvas, binarization_canvas, binarization_threshold);
    // 3. 輪郭抽出
    const lines = extractAndTraceBoundary(binarization_canvas, boundary_canvas);
    console.log("元の輪郭データ:", lines);

    // 4. 取得したすべての線を一括で間引き（epsilon = 2.0 に設定）＆ 戻り値を取得
    const simplifiedLines = simplifyLines(meshpoint_canvas, lines, 0.5);
    console.log("間引き後の頂点データ:", simplifiedLines);
  }

  source.onload = function () {
    processImage();
  };

  if (source.complete) {
    processImage();
  }

  /**
   * 画像を指定倍率・指定位置でキャンバスに描画する関数
   * @param {HTMLImageElement} img - 描画する画像要素
   * @param {HTMLCanvasElement} canvas - 描画先のキャンバス
   * @param {number} wScale - 横方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {number} hScale - 縦方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {string} hAlign - 左右の配置 ('left', 'center', 'right')
   * @param {string} vAlign - 上下の配置 ('top', 'middle', 'bottom')
   */
  function drawImageWithScaleAndAlignment(img, canvas, wScale = 1.0, hScale = 1.0, hAlign = "center", vAlign = "middle") {
    const ctx = canvas.getContext("2d");

    // キャンバスをクリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 指定された倍率を元に、描画時の「実際のサイズ」を計算
    const scaledW = img.naturalWidth * wScale;
    const scaledH = img.naturalHeight * hScale;

    const canvasW = canvas.width;
    const canvasH = canvas.height;

    // 2. 拡大・縮小後のサイズ（scaledW, scaledH）をベースに位置（X座標）を計算
    let x = 0;
    if (hAlign === "left") {
      x = 0;
    } else if (hAlign === "center") {
      x = (canvasW - scaledW) / 2;
    } else if (hAlign === "right") {
      x = canvasW - scaledW;
    }

    // 3. 拡大・縮小後のサイズをベースに位置（Y座標）を計算
    let y = 0;
    if (vAlign === "top") {
      y = 0;
    } else if (vAlign === "middle") {
      y = (canvasH - scaledH) / 2;
    } else if (vAlign === "bottom") {
      y = canvasH - scaledH;
    }

    // 4. 計算した座標と「変更後のサイズ」を指定して描画
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, x, y, scaledW, scaledH);
  }

  /**
   * 元キャンバスの画像を二値化して、先キャンバスに描画する関数
   * @param {HTMLCanvasElement} srcCanvas - 元となるキャンバス（Render Canvas）
   * @param {HTMLCanvasElement} dstCanvas - 出力先のキャンバス（Binarization Canvas）
   * @param {number} threshold - 閾値 (0 ~ 255)
   */
  function applyBinarization(srcCanvas, dstCanvas, threshold) {
    const srcCtx = srcCanvas.getContext("2d");
    const dstCtx = dstCanvas.getContext("2d");

    // 1. 元キャンバスからピクセルデータを取得
    const imageData = srcCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
    const data = imageData.data; // [R, G, B, A, R, G, B, A, ...] という配列になっている

    // 2. 全ピクセルをループ処理
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];     // 赤
      const g = data[i + 1]; // 緑
      const b = data[i + 2]; // 青
      const a = data[i + 3]; // 透明度 (0 = 完全透明, 255 = 完全不透明)

      // 元画像が透過（SVGの背景など）の場合の対策：透明部分は白（255）として扱う
      if (a === 0) {
        data[i] = 255;     // R
        data[i + 1] = 255; // G
        data[i + 2] = 255; // B
        continue;
      }

      // 一般的なグレースケール（輝度）変換公式 (NTSC係数による加重平均)
      const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

      // 3. 閾値（threshold）を基準に白か黒かに判定
      const color = brightness >= threshold ? 255 : 0;

      // 4. データを書き換え
      data[i] = color;     // R
      data[i + 1] = color; // G
      data[i + 2] = color; // B
      data[i + 3] = 255;   // A (不透明にする)
    }

    // 5. 処理後のピクセルデータを二値化キャンバスに描き出す
    dstCtx.putImageData(imageData, 0, 0);
  }

  /**
     * 1. 輪郭追跡を行い、1pixelずつ確実に色分け描画した上で、座標の多重配列を返す関数
     * @param {HTMLCanvasElement} binCanvas - 二値化キャンバス
     * @param {HTMLCanvasElement} bndCanvas - 境界線描画先キャンバス
     * @returns {Array<Array<{x:number, y:number}>>} 追跡されたすべての線の配列
     */
  function extractAndTraceBoundary(binCanvas, bndCanvas) {
    const binCtx = binCanvas.getContext("2d");
    const bndCtx = bndCanvas.getContext("2d");
    const width = binCanvas.width;
    const height = binCanvas.height;

    // 背景を白で初期化
    bndCtx.fillStyle = "white";
    bndCtx.fillRect(0, 0, width, height);

    const binImageData = binCtx.getImageData(0, 0, width, height);
    const binData = binImageData.data;

    // 黒ピクセル判定
    function isBlackPixel(x, y) {
      if (x < 0 || x >= width || y < 0 || y >= height) return false;
      const idx = (y * width + x) * 4;
      return binData[idx] < 128 && binData[idx + 3] > 0;
    }

    // 【ステップ1】1px幅の綺麗なエッジマップを作成
    const isEdge = Array.from({ length: height }, () => new Uint8Array(width));
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        if (isBlackPixel(x, y)) {
          // 上下左右のいずれかが白（または画面外）なら輪郭ピクセル
          if (!isBlackPixel(x, y - 1) || !isBlackPixel(x, y + 1) ||
            !isBlackPixel(x - 1, y) || !isBlackPixel(x + 1, y)) {
            isEdge[y][x] = 1;
          }
        }
      }
    }

    // 【ステップ2】外周トレース処理
    const visited = Array.from({ length: height }, () => new Uint8Array(width));
    const allLines = [];

    // 8方向の定義（0:右, 1:右下, 2:下, 3:左下, 4:左, 5:左上, 6:上, 7:右上）
    const dx = [1, 1, 0, -1, -1, -1, 0, 1];
    const dy = [0, 1, 1, 1, 0, -1, -1, -1];

    let colorIndex = 0;

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        // 未訪問のエッジを見つけたら、そこから一本の線を追跡開始
        if (isEdge[y][x] && !visited[y][x]) {

          const currentPath = [];
          let cx = x;
          let cy = y;

          // 初期侵入方向（左から右へスキャンして見つけたため、最初は右方向を基準にする）
          let dir = 0;

          const startX = x;
          const startY = y;

          while (true) {
            visited[cy][cx] = 1;
            currentPath.push({ x: cx, y: cy });

            let foundNext = false;

            // 左後ろ（dir + 5）から時計回りに周囲8マスを走査
            for (let i = 0; i < 8; i++) {
              const nextDir = (dir + 5 + i) % 8;
              const nx = cx + dx[nextDir];
              const ny = cy + dy[nextDir];

              if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                // スタート地点に戻ってきた場合（ループの結合判定）
                if (nx === startX && ny === startY && currentPath.length > 2) {
                  currentPath.push({ x: startX, y: startY });
                  foundNext = true;
                  cx = nx;
                  cy = ny;
                  break;
                }

                // 未訪問の輪郭ピクセルを発見
                if (isEdge[ny][nx] && !visited[ny][nx]) {
                  cx = nx;
                  cy = ny;
                  dir = nextDir;
                  foundNext = true;
                  break;
                }
              }
            }

            // 次のピクセルがない、またはスタート地点に完全に融合したら追跡終了
            if (!foundNext || (cx === startX && cy === startY)) {
              break;
            }
          }

          // 【ステップ3】1pixelずつ確実にキャンバスへ塗る処理
          // 2ピクセル以下の極小ノイズでなければ描画・登録
          if (currentPath.length > 2) {
            allLines.push(currentPath);

            // この線専用の色を決定
            const strokeColor = colors[colorIndex % colors.length];
            colorIndex++;

            // ctx.lineTo は斜め移動時に見た目がかすれることがあるため、
            // 座標配列から1ピクセルずつ 1x1 の正方形として確実に塗りつぶします
            bndCtx.fillStyle = strokeColor;
            for (let i = 0; i < currentPath.length; i++) {
              bndCtx.fillRect(currentPath[i].x, currentPath[i].y, 1, 1);
            }
          }
        }
      }
    }

    return allLines;
  }

  /**
   * 2. 受け取ったすべての線をダグラス・ペッカー法で間引き、Meshpoint Canvas にドットを描画して、間引いた線の配列を返す関数
   * @param {HTMLCanvasElement} mshCanvas - メッシュポイント描画先キャンバス
   * @param {Array<Array<{x:number, y:number}>>} lines - 線の多重配列
   * @param {number} epsilon - 間引きのしきい値
   * @returns {Array<Array<{x:number, y:number}>>} 間引かれたすべての線の多重配列
   */
  function simplifyLines(mshCanvas, lines, epsilon = 2.0) {
    const mshCtx = mshCanvas.getContext("2d");
    const width = mshCanvas.width;
    const height = mshCanvas.height;

    // キャンバスの初期化（白背景）
    mshCtx.fillStyle = "white";
    mshCtx.fillRect(0, 0, width, height);

    // 指定されたカラーパレット
    const colors = ["#FFA07A", "#E9967A", "#FA8072", "#F08080", "#CD5C5C", "#FF7F50", "#FF6347", "#FF4500", "#DC143C", "#B22222", "#8B0000"];

    // 間引いた後のすべての線を格納する配列
    const allSimplifiedLines = [];

    // 全ての線（パス）に対してループを回す
    for (let l = 0; l < lines.length; l++) {
      const path = lines[l];
      if (path.length < 3) continue; // 点が少なすぎるパスはスキップ

      let simplifiedPath;
      const start = path[0];
      const end = path[path.length - 1];

      // 閉じた輪郭（ループ）の分割処理
      if (start.x === end.x && start.y === end.y) {
        const mid = Math.floor(path.length / 2);
        const part1 = runDouglasPeucker(path.slice(0, mid + 1), epsilon);
        const part2 = runDouglasPeucker(path.slice(mid), epsilon);
        simplifiedPath = part1.slice(0, part1.length - 1).concat(part2);
      } else {
        simplifiedPath = runDouglasPeucker(path, epsilon);
      }

      // 結果の配列に追加
      allSimplifiedLines.push(simplifiedPath);

      // このライン（line）専用の色を配列から決定
      const strokeColor = colors[l % colors.length];
      mshCtx.fillStyle = strokeColor;

      // 間引かれた頂点を 1x1 のドットとして確実に塗りつぶす
      for (let i = 0; i < simplifiedPath.length; i++) {
        mshCtx.fillRect(simplifiedPath[i].x, simplifiedPath[i].y, 1, 1);
      }
    }

    // 間引いた後の多重配列を返す
    return allSimplifiedLines;
  }

  /**
   * 3. ダグラス・ペッカー法（アルゴリズム本体の再帰ロジック）
   */
  function runDouglasPeucker(points, epsilon) {
    if (points.length <= 2) return points;

    let maxDistance = 0;
    let index = 0;
    const end = points.length - 1;

    // 始点と終点を結ぶ直線から、最も遠い位置にある点（最大誤差の点）を探す
    for (let i = 1; i < end; i++) {
      const distance = getOrthogonalDistance(points[i], points[0], points[end]);
      if (distance > maxDistance) {
        index = i;
        maxDistance = distance;
      }
    }

    // 最大誤差がしきい値(epsilon)を超えている場合のみ、その点でパスを分割して再帰処理
    if (maxDistance > epsilon) {
      const results1 = runDouglasPeucker(points.slice(0, index + 1), epsilon);
      const results2 = runDouglasPeucker(points.slice(index), epsilon);
      // 境界の重複点を排除して結合
      return results1.slice(0, results1.length - 1).concat(results2);
    } else {
      // 誤差が十分に小さければ、中間の細かなギザギザ（曲線含む）はすべて直線とみなし両端だけ残す
      return [points[0], points[end]];
    }
  }

  /**
   * 4. 点と直線の最短距離を計算するヘルパー（安全版）
   */
  function getOrthogonalDistance(point, lineStart, lineEnd) {
    const dx = lineEnd.x - lineStart.x;
    const dy = lineEnd.y - lineStart.y;

    // 万が一、始点と終点が完全に一致していた場合の安全処理（点と点の距離を返す）
    const bottom = Math.sqrt(dx * dx + dy * dy);
    if (bottom === 0) {
      const splitDx = point.x - lineStart.x;
      const splitDy = point.y - lineStart.y;
      return Math.sqrt(splitDx * splitDx + splitDy * splitDy);
    }

    // 点と直線の距離の公式
    const area = Math.abs(dy * point.x - dx * point.y + lineEnd.x * lineStart.y - lineEnd.y * lineStart.x);
    return area / bottom;
  }

</script>
