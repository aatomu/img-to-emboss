<!DOCTYPE html>

<head>
  <title>Image to Emboss (Smooth Marching Squares)</title>
  <style>
    body {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-around;

      width: 100vw;
      margin: 0;
      padding: 0;
    }

    .box {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .box span {
      text-decoration: underline;
      margin-bottom: 5px;
    }

    .box img,
    .box canvas,
    .box svg {
      aspect-ratio: 9/16;
      width: 450px;
      image-rendering: pixelated;
      border-color: black;
      border-width: 2px;
      border-style: solid;
      background-color: white;
      /* SVG用に背景を白に */
    }
  </style>
</head>

<body>
  <div class="box">
    <span>Source</span>
    <img id="source" src="./yuruyuru_atomu.svg"></img>
  </div>
  <div class="box">
    <span>Render Canvas</span>
    <canvas id="render_canvas"></canvas>
  </div>
  <div class="box">
    <span>Mesh Solid</span>
    <canvas id="boundary_canvas"></canvas>
  </div>
  <div class="box">
    <span>Mesh Wireframe</span>
    <svg id="mesh_preview_svg"></svg>
  </div>
</body>

<script>
  const canvas_width = 360;
  const canvas_height = 640;
  const binarization_threshold = 128;

  const source = document.getElementById("source");
  const render_canvas = document.getElementById("render_canvas");
  const boundary_canvas = document.getElementById("boundary_canvas");
  const mesh_preview_svg = document.getElementById("mesh_preview_svg");

  render_canvas.width = canvas_width;
  render_canvas.height = canvas_height;
  boundary_canvas.width = canvas_width;
  boundary_canvas.height = canvas_height;
  mesh_preview_svg.setAttribute("viewBox", `0 0 ${canvas_width} ${canvas_height}`);

  function processImage() {
    // 1. imgからcanvasに転写
    drawImageWithScaleAndAlignment(source, render_canvas, 0.45, 0.45, "center", "middle");
    // 2. Render Canvas から直接 Marching Squares を実行（線形補間で滑らかに！）
    const stepSize = 3; // 中間色を使うため、stepが2や3でもかなり綺麗に出ます
    const meshData = generateGreedyMarchingSquaresMesh(render_canvas, binarization_threshold, stepSize);
    console.log("Smooth Marching Squares メッシュデータ:", meshData);

    // 3. プレビューの描画
    drawMeshSolid(boundary_canvas, meshData);
    drawMeshSVG(mesh_preview_svg, meshData); // 極細のSVG線でプレビュー

    // 4. 3Dデータ(OBJ)として書き出し
    const objText = exportToOBJ([meshData], 10.0);

    // ダウンロード処理
    const blob = new Blob([objText], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "character_emboss_smooth.obj";
    link.click();
  }

  source.onload = function () {
    processImage();
  };

  if (source.complete) {
    processImage();
  }

  /**
   * 画像を指定倍率・指定位置でキャンバスに描画する関数
   * @param {HTMLImageElement} img - 描画する画像要素
   * @param {HTMLCanvasElement} canvas - 描画先のキャンバス
   * @param {number} wScale - 横方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {number} hScale - 縦方向の倍率（1.0 = 等倍, 2.0 = 2倍, 0.5 = 半分）
   * @param {string} hAlign - 左右の配置 ('left', 'center', 'right')
   * @param {string} vAlign - 上下の配置 ('top', 'middle', 'bottom')
   */
  function drawImageWithScaleAndAlignment(img, canvas, wScale = 1.0, hScale = 1.0, hAlign = "center", vAlign = "middle") {
    const ctx = canvas.getContext("2d");

    // キャンバスをクリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 指定された倍率を元に、描画時の「実際のサイズ」を計算
    const scaledW = img.naturalWidth * wScale;
    const scaledH = img.naturalHeight * hScale;

    const canvasW = canvas.width;
    const canvasH = canvas.height;

    // 2. 拡大・縮小後のサイズ（scaledW, scaledH）をベースに位置（X座標）を計算
    let x = 0;
    if (hAlign === "left") {
      x = 0;
    } else if (hAlign === "center") {
      x = (canvasW - scaledW) / 2;
    } else if (hAlign === "right") {
      x = canvasW - scaledW;
    }

    // 3. 拡大・縮小後のサイズをベースに位置（Y座標）を計算
    let y = 0;
    if (vAlign === "top") {
      y = 0;
    } else if (vAlign === "middle") {
      y = (canvasH - scaledH) / 2;
    } else if (vAlign === "bottom") {
      y = canvasH - scaledH;
    }

    // 4. 計算した座標と「変更後のサイズ」を指定して描画
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, x, y, scaledW, scaledH);
  }

  /**
   * 中間色を使用した線形補間付き Marching Squares
   */
  function generateGreedyMarchingSquaresMesh(srcCanvas, threshold, cellSize = 8) {
    const ctx = srcCanvas.getContext("2d");
    const width = srcCanvas.width;
    const height = srcCanvas.height;
    const imgData = ctx.getImageData(0, 0, width, height);
    const data = imgData.data;

    // 1. 指定座標のピクセルの明るさを取得
    function getVal(x, y) {
      if (x < 0 || x >= width || y < 0 || y >= height) return 255;
      const idx = (y * width + x) * 4;
      // 透過ピクセルは白扱いにする
      if (data[idx + 3] === 0) return 255;
      return 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
    }

    // 線形補間
    function lerpOffset(v1, v2) {
      if (v1 === v2) return 0.5;
      return (threshold - v1) / (v2 - v1);
    }

    const vertexMap = new Map();
    const vertices = [];
    const indices = [];

    function addVertex(x, y) {
      // 座標を小数点第2位で丸めて、近すぎる頂点を共有させる
      const kx = Math.round(x * 100) / 100;
      const ky = Math.round(y * 100) / 100;
      const key = `${kx},${ky}`;
      if (vertexMap.has(key)) return vertexMap.get(key);

      const idx = vertices.length / 2;
      vertices.push(kx, ky); // 丸めた座標を使用
      vertexMap.set(key, idx);
      return idx;
    }

    function addTriangle(p1, p2, p3) {
      indices.push(addVertex(p1.x, p1.y), addVertex(p2.x, p2.y), addVertex(p3.x, p3.y));
    }

    // グリッドの次元を計算 (量子単位でループするため)
    const step = quantumLevel;
    const cols = Math.floor((width - 1) / step);
    const rows = Math.floor((height - 1) / step);

    // 3-A. 完全な四角形（パターン15）を管理する2次元グリッド配列
    // 結合済みかどうかを追跡するため、booleanの2次元配列として初期化
    const greedyGrid = Array.from({ length: rows }, () => new Array(cols).fill(false));

    // --- フェーズ 1: Marching Squares の実行 & セル選別 ---
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * step;
        const y = r * step;

        const vTL = getVal(x, y);
        const vTR = getVal(x + step, y);
        const vBL = getVal(x, y + step);
        const vBR = getVal(x + step, y + step);

        // 閾値より暗い（黒に近い）場合を「実体（Solid）」として1にする
        const tl = vTL < threshold ? 1 : 0;
        const tr = vTR < threshold ? 1 : 0;
        const bl = vBL < threshold ? 1 : 0;
        const br = vBR < threshold ? 1 : 0;

        const state = (tl << 3) | (tr << 2) | (br << 1) | bl;
        if (state === 0) continue;

        // パターン15（完全な四角形）はGreedy用グリッドに登録
        if (state === 15) {
          greedyGrid[r][c] = true;
          continue;
        }

        // 3-B. 斜め・三角形（パターン1〜14）：即座に三角形化して出力メッシュに登録
        const P_TL = { x: x, y: y };
        const P_TR = { x: x + step, y: y };
        const P_BR = { x: x + step, y: y + step };
        const P_BL = { x: x, y: y + step };

        const P_T = { x: x + step * lerpOffset(vTL, vTR), y: y };
        const P_R = { x: x + step, y: y + step * lerpOffset(vTR, vBR) };
        const P_B = { x: x + step * lerpOffset(vBL, vBR), y: y + step };
        const P_L = { x: x, y: y + step * lerpOffset(vTL, vBL) };

        // パターンに応じた三角形分割
        switch (state) {
          case 1: addTriangle(P_L, P_B, P_BL); break;
          case 2: addTriangle(P_B, P_R, P_BR); break;
          case 3: addTriangle(P_L, P_R, P_BR); addTriangle(P_L, P_BR, P_BL); break;
          case 4: addTriangle(P_R, P_T, P_TR); break;
          case 5: addTriangle(P_L, P_B, P_BL); addTriangle(P_R, P_T, P_TR); break;
          case 6: addTriangle(P_B, P_T, P_TR); addTriangle(P_B, P_TR, P_BR); break;
          case 7: addTriangle(P_L, P_T, P_TR); addTriangle(P_L, P_TR, P_BR); addTriangle(P_L, P_BR, P_BL); break;
          case 8: addTriangle(P_T, P_L, P_TL); break;
          case 9: addTriangle(P_T, P_B, P_BL); addTriangle(P_T, P_BL, P_TL); break;
          case 10: addTriangle(P_T, P_L, P_TL); addTriangle(P_B, P_R, P_BR); break;
          case 11: addTriangle(P_T, P_R, P_BR); addTriangle(P_T, P_BR, P_BL); addTriangle(P_T, P_BL, P_TL); break;
          case 12: addTriangle(P_R, P_L, P_TL); addTriangle(P_R, P_TL, P_TR); break;
          case 13: addTriangle(P_R, P_B, P_BL); addTriangle(P_R, P_BL, P_TL); addTriangle(P_R, P_TL, P_TR); break;
          case 14: addTriangle(P_B, P_L, P_TL); addTriangle(P_B, P_TL, P_TR); addTriangle(P_B, P_TR, P_BR); break;
        }
      }
    }

    // --- フェーズ 2: 4. Greedy Meshing の実行 & 5. 三角形化してマージ ---
    // 訪問済みを追跡するフラグ配列
    const visited = Array.from({ length: rows }, () => new Array(cols).fill(false));

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // パターン15であり、かつ未訪問のセルから貪欲法（Greedy）を開始
        if (!greedyGrid[r][c] || visited[r][c]) continue;

        // 幅(w)の拡張
        let w = 1;
        while (c + w < cols && greedyGrid[r][c + w] && !visited[r][c + w]) {
          w++;
        }

        // 高さ(h)の拡張
        let h = 1;
        while (r + h < rows) {
          let lineMatch = true;
          for (let k = 0; k < w; k++) {
            if (!greedyGrid[r + h][c + k] || visited[r + h][c + k]) {
              lineMatch = false;
              break;
            }
          }
          if (!lineMatch) break;
          h++;
        }

        // 拡張した矩形範囲を訪問済みにする
        for (let dy = 0; dy < h; dy++) {
          for (let dx = 0; dx < w; dx++) {
            visited[r + dy][c + dx] = true;
          }
        }

        // 結合された巨大な矩形の4隅の座標を計算
        const x1 = c * step;
        const y1 = r * step;
        const x2 = (c + w) * step;
        const y2 = (r + h) * step;

        const G_TL = { x: x1, y: y1 };
        const G_TR = { x: x2, y: y1 };
        const G_BR = { x: x2, y: y2 };
        const G_BL = { x: x1, y: y2 };

        // 矩形を2つの三角形に分割して、共通の出力配列（vertices, indices）にマージ
        addTriangle(G_BL, G_TL, G_TR);
        addTriangle(G_BL, G_TR, G_BR);
      }
    }

    // 最終的なメッシュデータを返す
    return { vertices, indices };
  }

  function drawMeshSolid(canvas, mesh) {
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#FF7F50";

    const { vertices, indices } = mesh;
    for (let i = 0; i < indices.length; i += 3) {
      ctx.beginPath();
      ctx.moveTo(vertices[indices[i] * 2], vertices[indices[i] * 2 + 1]);
      ctx.lineTo(vertices[indices[i + 1] * 2], vertices[indices[i + 1] * 2 + 1]);
      ctx.lineTo(vertices[indices[i + 2] * 2], vertices[indices[i + 2] * 2 + 1]);
      ctx.closePath();
      ctx.fill();
    }
  }

  /**
   * SVG要素を使って極細線(0.3px)でワイヤーフレームをプレビューする
   */
  function drawMeshSVG(svg, mesh) {
    const { vertices, indices } = mesh;
    let pathData = "";

    // 数千〜数万ポリゴンでもブラウザが耐えられるように、1つの長い「d」属性として構築します
    for (let i = 0; i < indices.length; i += 3) {
      const v1x = vertices[indices[i] * 2], v1y = vertices[indices[i] * 2 + 1];
      const v2x = vertices[indices[i + 1] * 2], v2y = vertices[indices[i + 1] * 2 + 1];
      const v3x = vertices[indices[i + 2] * 2], v3y = vertices[indices[i + 2] * 2 + 1];

      pathData += `M ${v1x} ${v1y} L ${v2x} ${v2y} L ${v3x} ${v3y} Z `;
    }

    // 中身をクリア
    svg.innerHTML = "";

    // 極細のパスを作成してSVGに追加
    const pathObj = document.createElementNS("http://www.w3.org/2000/svg", "path");
    pathObj.setAttribute("d", pathData);
    pathObj.setAttribute("stroke", "#8B0000"); // 線の色
    pathObj.setAttribute("stroke-width", "0.3"); // 【極細線】
    pathObj.setAttribute("fill", "none");
    pathObj.setAttribute("stroke-linejoin", "round");

    svg.appendChild(pathObj);
  }

  function exportToOBJ(meshes, thickness = 10.0) {
    let objLines = [];
    objLines.push("# Wavefront OBJ file exported from Image to Emboss Processor");
    objLines.push("# Generated via Smooth Marching Squares");

    let vertexOffset = 1; // OBJのインデックスは1から始まります

    meshes.forEach((mesh, mIdx) => {
      objLines.push(`\no mesh_part_${mIdx}`);
      const vertices = mesh.vertices;
      const indices = mesh.indices;
      const vertexCount = vertices.length / 2;

      // 1. 頂点データ出力 (前面 Z = thickness, 背面 Z = 0)
      // 前面 (Front side)
      for (let i = 0; i < vertices.length; i += 2) {
        objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} ${thickness.toFixed(4)}`);
      }
      // 背面 (Back side)
      for (let i = 0; i < vertices.length; i += 2) {
        objLines.push(`v ${vertices[i].toFixed(4)} ${vertices[i + 1].toFixed(4)} 0.0000`);
      }

      // 2. 面データ出力 (前面・背面・側面のポリゴンをインデックス構築)
      objLines.push("# Front faces");
      for (let i = 0; i < indices.length; i += 3) {
        // 前面は反時計回り(CCW)
        const v0 = vertexOffset + indices[i];
        const v1 = vertexOffset + indices[i + 1];
        const v2 = vertexOffset + indices[i + 2];
        objLines.push(`f ${v0} ${v1} ${v2}`);
      }

      objLines.push("# Back faces");
      for (let i = 0; i < indices.length; i += 3) {
        // 背面は前面の裏側になるので、法線を外に向けるために頂点の順序を反転
        const v0 = vertexOffset + vertexCount + indices[i];
        const v1 = vertexOffset + vertexCount + indices[i + 2];
        const v2 = vertexOffset + vertexCount + indices[i + 1];
        objLines.push(`f ${v0} ${v1} ${v2}`);
      }

      // 3. 側面 (Side walls) の自動生成
      objLines.push("# Side wall faces");

      // エッジマップを作って出現回数をカウント
      const edgeMap = {};
      for (let i = 0; i < indices.length; i += 3) {
        const tri = [indices[i], indices[i + 1], indices[i + 2]];
        for (let j = 0; j < 3; j++) {
          const u = tri[j];
          const v = tri[(j + 1) % 3];
          const key = u < v ? `${u}_${v}` : `${v}_${u}`;
          if (!edgeMap[key]) {
            edgeMap[key] = { count: 1, from: u, to: v };
          } else {
            edgeMap[key].count++;
          }
        }
      }

      // countが1のエッジ（＝他の三角形と共有されていない＝一番外側の外周、または内周の穴のフチ）を側面として壁を立てる
      for (const key in edgeMap) {
        if (edgeMap[key].count === 1) {
          const u = edgeMap[key].from;
          const v = edgeMap[key].to;

          // 前面の2点
          const f_u = vertexOffset + u;
          const f_v = vertexOffset + v;
          // 背面の2点
          const b_u = vertexOffset + vertexCount + u;
          const b_v = vertexOffset + vertexCount + v;

          // 2つの三角形(テクスチャのポリゴン単位)を組み合わせて側面の四角形の壁を作る
          objLines.push(`f ${f_u} ${b_u} ${b_v}`);
          objLines.push(`f ${f_u} ${b_v} ${f_v}`);
        }
      }

      // 次の独立メッシュ（パーツ）へ向けてインデックスをずらす
      vertexOffset += vertexCount * 2;
    });

    return objLines.join("\n");
  }

</script>
