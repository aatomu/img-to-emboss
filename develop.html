<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Image to Emboss (Full Pixel Scan Binary Tree)</title>
  <style>
    body {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-around;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: sans-serif;
    }

    .box {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      margin: 20px;
    }

    .box span {
      font-weight: bold;
      text-decoration: underline;
      margin-bottom: 5px;
    }

    .box img,
    .box canvas,
    .box svg {
      aspect-ratio: 9/16;
      width: 450px;
      image-rendering: pixelated;
      border: 2px solid black;
      background-color: white;
    }
  </style>
</head>

<body>
  <div class="box">
    <span>Source</span>
    <img id="source" src="./yuruyuru_atomu.svg" alt="Source Image">
  </div>
  <div class="box">
    <span>Render Canvas (Grayscale)</span>
    <canvas id="render_canvas"></canvas>
  </div>
  <div class="box">
    <span>Mesh Wireframe Preview</span>
    <svg id="mesh_preview_svg"></svg>
  </div>
  <div class="box">
    <span>Config</span>
    <div>
      <span>Image quarity</span>
      <select>
        <option>360p(Light/Law Quarity)</option>
        <option>480p/SD</option>
        <option>720p/HD</option>
        <option>1080p/FHD(Heavey/High Quarity)</option>
      </select>
      <span>Noise threshold</span>
      <input type=number step=1>
      <span>Minimum cell size</span>
      <input type=number step=1>
      <span>Model base height(mm)</span>
      <input type=number step=0.1>
      <span>Model bump height(mm)</span>
      <input type=number step=0.1>
      <span>Export height(mm)</span>
      <input type=number step=1>
      <span>Export width(mm)</span>
      <input type=number step=1>
    </div>
  </div>
  <script>
    const canvas_width = 360;
    const canvas_height = 640;

    const source = document.getElementById("source");
    const render_canvas = document.getElementById("render_canvas");
    const mesh_preview_svg = document.getElementById("mesh_preview_svg");

    render_canvas.width = canvas_width;
    render_canvas.height = canvas_height;
    mesh_preview_svg.setAttribute("viewBox", `0 0 ${canvas_width} ${canvas_height}`);

    function processImage() {
      console.log("--- 全ピクセル走査二分木 開始 ---");
      drawImageWithScaleAndAlignment(source, render_canvas, 0.45, 0.45, "center", "middle");

      const errorThreshold = 15;
      const minCellSize = 4;

      const meshData = heightmapToBinaryTreeMesh(render_canvas, errorThreshold, minCellSize);
      console.log("最終メッシュデータ:", meshData);

      drawMeshSVG(mesh_preview_svg, meshData);

      const baseHeight = 20.0;   // 土台の厚み (mm) -> 白(0xFF)のとき、この高さになる
      const bumpHeight = 5.0;   // 凸部の純粋な高さ最大値 (mm) -> 黒(0x00)のとき、baseHeight + bumpHeight になる
      const objText = exportToSolidOBJ(meshData, baseHeight, bumpHeight);

      download("character_emboss_full_scan.obj", new Blob([objText], { type: "text/plain" }));
    }

    source.onload = function () { processImage(); };
    if (source.complete) { processImage(); }

    function drawImageWithScaleAndAlignment(img, canvas, wScale = 1.0, hScale = 1.0, hAlign = "center", vAlign = "middle") {
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const scaledW = img.naturalWidth * wScale;
      const scaledH = img.naturalHeight * hScale;
      const canvasW = canvas.width;
      const canvasH = canvas.height;

      let x = (canvasW - scaledW) / 2;
      let y = (canvasH - scaledH) / 2;

      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, x, y, scaledW, scaledH);

      const imgData = ctx.getImageData(0, 0, canvasW, canvasH);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const gray = Math.round(0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]);
        data[i] = gray; data[i + 1] = gray; data[i + 2] = gray;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    function heightmapToBinaryTreeMesh(canvas, errorThreshold, minCellSize) {
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      const imgData = ctx.getImageData(0, 0, W, H).data;

      function getSample(px, py) {
        const cx = Math.max(0, Math.min(W - 1, Math.floor(px)));
        const cy = Math.max(0, Math.min(H - 1, Math.floor(py)));
        return imgData[(cy * W + cx) * 4 + 0];
      }

      const vertices = [];
      const indices = [];
      const vertexMap = new Map();

      function getOrAddVertex(x, y) {
        const sampleValue = getSample(x, y);
        // 黒(0)で1.0、白(255)で0.0
        const heightValue = (255 - sampleValue) / 255.0;

        const key = `${x.toFixed(1)},${y.toFixed(1)}`;
        if (vertexMap.has(key)) {
          return vertexMap.get(key);
        }
        const vIdx = vertices.length;
        vertices.push({ x: x, y: y, h: heightValue });
        vertexMap.set(key, vIdx);
        return vIdx;
      }

      // 領域内のピクセルを全走査する
      function checkError(x, y, w, h) {
        let minV = 255;
        let maxV = 0;

        // 切り捨てによる走査漏れを防ぐため、Math.ceilでカバーするピクセル範囲を確定
        const startX = Math.floor(x);
        const startY = Math.floor(y);
        const endX = Math.min(W - 1, Math.ceil(x + w));
        const endY = Math.min(H - 1, Math.ceil(y + h));

        // ループのステップを「1」にし、全pixelをなめる
        for (let py = startY; py <= endY; py++) {
          for (let px = startX; px <= endX; px++) {
            const val = imgData[(py * W + px) * 4 + 0];
            if (val < minV) minV = val;
            if (val > maxV) maxV = val;
          }
        }
        return maxV - minV;
      }

      let callCount = 0;

      function binaryTree(x, y, w, h) {
        callCount++;

        if (x >= W || y >= H || w <= 0 || h <= 0) return;

        // 全ピクセル走査による正確な高低差エラーを取得
        const error = checkError(x, y, w, h);

        // どちらかの辺が minCellSize 以下、または領域内の全ピクセルが完全に平坦(error <= threshold)なら葉とする
        if (error <= errorThreshold || (w <= minCellSize && h <= minCellSize)) {
          // はみ出しをW, Hでクリップ
          const actualW = Math.min(w, W - x);
          const actualH = Math.min(h, H - y);
          if (actualW <= 0 || actualH <= 0) return;

          const idxTL = getOrAddVertex(x, y);
          const idxTR = getOrAddVertex(x + actualW, y);
          const idxBL = getOrAddVertex(x, y + actualH);
          const idxBR = getOrAddVertex(x + actualW, y + actualH);

          indices.push(idxTL, idxBL, idxTR);
          indices.push(idxTR, idxBL, idxBR);
          return;
        }

        // 長い方の辺を2等分
        if (w >= h) {
          const halfW = w / 2;
          binaryTree(x, y, halfW, h);
          binaryTree(x + halfW, y, halfW, h);
        } else {
          const halfH = h / 2;
          binaryTree(x, y, w, halfH);
          binaryTree(x, y + halfH, w, halfH);
        }
      }

      binaryTree(0, 0, W, H);
      console.log(`二分木走査完了。処理セル数: ${callCount}`);

      return { vertices, indices, width: W, height: H };
    }

    function drawMeshSVG(svg, meshData) {
      svg.innerHTML = "";
      const fragment = document.createDocumentFragment();
      const indices = meshData.indices;
      const vertices = meshData.vertices;

      for (let i = 0; i < indices.length; i += 3) {
        const v0 = vertices[indices[i]];
        const v1 = vertices[indices[i + 1]];
        const v2 = vertices[indices[i + 2]];

        const avgH = (v0.h + v1.h + v2.h) / 3;
        const colorVal = Math.round(240 - (avgH * 140));
        const fillColor = `rgb(${colorVal},${colorVal},${colorVal})`;

        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        polygon.setAttribute("points", `${v0.x},${v0.y} ${v1.x},${v1.y} ${v2.x},${v2.y}`);
        polygon.setAttribute("fill", fillColor);
        polygon.setAttribute("stroke", "#444444");
        polygon.setAttribute("stroke-width", "0.2");
        fragment.appendChild(polygon);
      }
      svg.appendChild(fragment);
    }

    function exportToSolidOBJ(meshData, baseHeight, bumpHeight) {
      let objLines = [];
      objLines.push("# Exported Solid Binary Tree Emboss Block Mesh with Clean Walls");

      const vertices = meshData.vertices;
      const indices = meshData.indices;
      const W = meshData.width;
      const H = meshData.height;

      // ==========================================
      // 1. 表面 vertex作成
      // ==========================================
      objLines.push("# 1. Top Surface Vertices");
      for (const v of vertices) {
        const z = baseHeight + (bumpHeight * v.h);
        objLines.push(`v ${v.x.toFixed(4)} ${(H - v.y).toFixed(4)} ${z.toFixed(4)}`);
      }

      // ==========================================
      // 2. 外周の各辺（軸ごと）の頂点を抽出・ソート
      // ==========================================
      const eps = 0.1;

      // 表面の頂点インデックス(1-based)と座標を各軸（辺）ごとに格納
      let topEdgeTop = []; // 上辺 (Y = 0)
      let topEdgeBottom = []; // 下辺 (Y = H)
      let topEdgeLeft = []; // 左辺 (X = 0)
      let topEdgeRight = []; // 右辺 (X = W)

      for (let i = 0; i < vertices.length; i++) {
        const v = vertices[i];
        const idx = i + 1; // OBJの1-based index

        if (Math.abs(v.y - 0) < eps) topEdgeTop.push({ idx, x: v.x, y: v.y });
        else if (Math.abs(v.y - H) < eps) topEdgeBottom.push({ idx, x: v.x, y: v.y });

        if (Math.abs(v.x - 0) < eps) topEdgeLeft.push({ idx, x: v.x, y: v.y });
        else if (Math.abs(v.x - W) < eps) topEdgeRight.push({ idx, x: v.x, y: v.y });
      }

      // 端から順番に並ぶようにソート
      topEdgeTop.sort((a, b) => a.x - b.x);       // 左(0)から右(W)へ
      topEdgeBottom.sort((a, b) => a.x - b.x);    // 左(0)から右(W)へ
      topEdgeLeft.sort((a, b) => a.y - b.y);      // 上(0)から下(H)へ
      topEdgeRight.sort((a, b) => a.y - b.y);     // 上(0)から下(H)へ

      // ==========================================
      // 3. 表面 face 出力
      // ==========================================
      objLines.push("\n# 3. Top Surface Faces");
      for (let i = 0; i < indices.length; i += 3) {
        objLines.push(`f ${indices[i] + 1} ${indices[i + 1] + 1} ${indices[i + 2] + 1}`);
      }

      // ==========================================
      // 4. 裏面 vertex を作成 (H=0 固定)
      // 外周の並び順を維持したまま、全く同じX, YでZ=0の頂点を作る
      // ==========================================
      objLines.push("\n# 4. Bottom Surface Vertices (Z=0)");

      let topVertexCount = vertices.length;
      let currentBotIdx = topVertexCount + 1;

      // 裏面頂点のインデックスを紐付ける関数
      function createBottomVertices(edgeArray) {
        for (let item of edgeArray) {
          objLines.push(`v ${item.x.toFixed(4)} ${(H - item.y).toFixed(4)} 0.0000`);
          item.botIdx = currentBotIdx;
          currentBotIdx++;
        }
      }

      createBottomVertices(topEdgeTop);
      createBottomVertices(topEdgeBottom);
      createBottomVertices(topEdgeLeft);
      createBottomVertices(topEdgeRight);

      // ==========================================
      // 6. 上下左右の表裏をつなげるface（先に壁を張ります）
      // ==========================================
      objLines.push("\n# 6. Side Wall Faces");

      // 各辺の隣り合う2点から、ねじれのない四角形（三角形2枚）を生成する共通関数
      // flipの真偽値で法線が外を向くように調整
      function buildWall(edgeArray, flip) {
        for (let i = 0; i < edgeArray.length - 1; i++) {
          const tA = edgeArray[i].idx;
          const tB = edgeArray[i + 1].idx;
          const bA = edgeArray[i].botIdx;
          const bB = edgeArray[i + 1].botIdx;

          if (flip) {
            objLines.push(`f ${tA} ${bB} ${tB}`);
            objLines.push(`f ${tA} ${bA} ${bB}`);
          } else {
            objLines.push(`f ${tA} ${tB} ${bB}`);
            objLines.push(`f ${tA} ${bB} ${bA}`);
          }
        }
      }

      // 各壁の向き（時計回り・反時計回り）に合わせて法線方向を外側へ向ける
      buildWall(topEdgeTop, true);  // 上壁
      buildWall(topEdgeBottom, false); // 下壁
      buildWall(topEdgeLeft, false); // 左壁
      buildWall(topEdgeRight, true);  // 右壁

      // ==========================================
      // 5. 裏面 face（四隅の対応関係を維持してシンプルに2枚で閉じる）
      // ==========================================
      objLines.push("\n# 5. Bottom Flat Faces");

      // 各辺の端（角）にあたる裏面頂点インデックスを取得
      const bCorner_TL = topEdgeTop[0].botIdx;
      const bCorner_TR = topEdgeTop[topEdgeTop.length - 1].botIdx;
      const bCorner_BL = topEdgeBottom[0].botIdx;
      const bCorner_BR = topEdgeBottom[topEdgeBottom.length - 1].botIdx;

      // 裏面から見て時計回り（法線が真下 Z- を向く）
      objLines.push(`f ${bCorner_TL} ${bCorner_TR} ${bCorner_BR}`);
      objLines.push(`f ${bCorner_TL} ${bCorner_BR} ${bCorner_BL}`);

      return objLines.join("\n");
    }

    function download(name, blob) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = name;
      link.click();
    }
  </script>
</body>

</html>
